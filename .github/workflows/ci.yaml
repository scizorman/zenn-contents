name: 'CI'

on:
  - 'pull_request'

permissions: {}

jobs:
  lint:
    runs-on: 'ubuntu-slim'
    permissions:
      contents: 'read'
    timeout-minutes: 5
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # v7
        with:
          persist-credentials: false
      - uses: 'cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3' # v31
      - run: |
          nix develop --command make lint
