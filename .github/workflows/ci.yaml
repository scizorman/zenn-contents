name: 'CI'

on:
  - 'pull_request'

permissions: {}

jobs:
  lint:
    runs-on: 'ubuntu-slim'
    permissions:
      contents: 'read'
    timeout-minutes: 5
    steps:
      - uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6
        with:
          persist-credentials: false
      - uses: 'cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b' # v31
      - run: |
          nix develop --command make lint
