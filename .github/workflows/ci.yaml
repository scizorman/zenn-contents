name: 'CI'

on:
  - 'pull_request'

permissions: {}

jobs:
  lint:
    runs-on: 'ubuntu-slim'
    permissions:
      contents: 'read'
    timeout-minutes: 5
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10' # v6
        with:
          persist-credentials: false
      - uses: 'cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3' # v31
      - run: |
          nix develop --command make lint
