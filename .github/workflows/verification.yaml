name: Verification

on:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - name: Set up mise
        uses: jdx/mise-action@5ac50f778e26fac95da98d50503682459e86d566 # v3
      - name: Lint
        run: make lint
